<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác minh vé</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa, #e4e9f0);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 16px;
            padding: 24px 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
            text-align: center;
        }

        .icon {
            font-size: 56px;
            margin-bottom: 12px;
        }

        .success {
            color: #1e9e4a;
        }

        .error {
            color: #e53935;
        }

        h2 {
            margin: 8px 0 16px;
        }

        .info {
            text-align: left;
            margin-top: 16px;
            font-size: 15px;
        }

        .info p {
            margin: 8px 0;
        }

        .label {
            color: #777;
        }

        .value {
            font-weight: 600;
            color: #222;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }

        @media (max-width: 480px) {
            .card {
                padding: 20px 16px;
            }

            .icon {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div th:if="${valid}">
            <h2 class="success">✅ Vé hợp lệ</h2>
            <p><b>Mã vé:</b> [[${ticket.ticketCode}]]</p>
            <p><b>Hành khách:</b> [[${ticket.passengerName}]]</p>
        </div>

        <div th:unless="${valid}">
            <h2 class="error">❌ Vé không hợp lệ</h2>
            <p th:text="${message}"></p>
        </div>

        <div class="footer">
            © 2026 Train Ticket System
        </div>
    </div>
</body>
</html>
