<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link th:href="@{/img/favicon.ico}" rel="shortcut icon" type="image/x-icon">
    <!-- Bootstrap v5.0.1 -->
    <link th:href="@{/css/bootstrap.css}" type="text/css" rel="stylesheet">
    <script th:src="@{/js/bootstrap.bundle.js}" type="text/javascript"></script>
    <!-- Bootstrap Icons v1.5.0 -->
    <link th:href="@{/css/bootstrap-icons.css}" type="text/css" rel="stylesheet">
    <!-- Custom Styles -->
    <link th:href="@{/css/styles.css}" type="text/css" rel="stylesheet">

    <script>
        var changeLanguage = function (dom) {
            window.location.href = '?lang=' + dom.value;
        }
    </script>
</head>

<body style="padding-top: 55px;">
<!--header frag-->
<div th:replace="/admin/common/fragments :: header_nav"> </div>
<!-- Sidebar Fragment -->
<div th:replace="/admin/common/fragments :: side_navbar"> </div>

<!-- Main Content -->
<div class="main-content">

    <div class="container-fluid">
        <!-- Error -->
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4">

                        <h5 class="text-center mb-4 fw-semibold">
                            Cập nhật mật khẩu mới
                        </h5>

                        <form th:action="@{/admin/updatePassword}"
                              method="post"
                              th:object="${user}">

                            <!-- New password -->
                            <div class="mb-3">
                                <label class="form-label">Mật khẩu mới</label>

                                <div class="position-relative">
                                    <input type="password"
                                           class="form-control pe-5"
                                           id="newPassword"
                                           th:field="*{newPassword}">

                                    <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3 cursor-pointer"
                                       onclick="togglePassword('newPassword', this)"></i>
                                </div>

                                <div class="text-danger small mt-1"
                                     th:if="${#fields.hasErrors('newPassword')}"
                                     th:errors="*{newPassword}"></div>
                            </div>

                            <!-- Confirm password -->
                            <div class="mb-4">
                                <label class="form-label">Nhập lại mật khẩu</label>

                                <div class="position-relative">
                                    <input type="password"
                                           class="form-control pe-5"
                                           id="rePassword"
                                           th:field="*{rePassword}">

                                    <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3 cursor-pointer"
                                       onclick="togglePassword('rePassword', this)"></i>
                                </div>

                                <div class="text-danger small mt-1"
                                     th:if="${#fields.hasErrors('rePassword')}"
                                     th:errors="*{rePassword}"></div>
                            </div>


                            <!-- Buttons -->
                            <div class="d-flex justify-content-between">
                                <button type="submit" class="btn btn-success px-4">
                                    <i class="bi bi-check-circle me-1"></i> Đổi mật khẩu
                                </button>

                                <a class="btn btn-secondary px-4"
                                   th:href="@{/admin/home}">
                                    <i class="bi bi-arrow-left me-1"></i> Quay lại
                                </a>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>

<script>
    function togglePassword(inputId, icon) {
        const input = document.getElementById(inputId);

        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove("bi-eye");
            icon.classList.add("bi-eye-slash");
        } else {
            input.type = "password";
            icon.classList.remove("bi-eye-slash");
            icon.classList.add("bi-eye");
        }
    }
</script>
</html>
