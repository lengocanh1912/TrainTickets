<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Trang quản trị - TrainTickets</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/styles.css}">
  <link th:href="@{'/img/favicon.ico'}" rel="shortcut icon" type="image/x-icon">
  <!-- Bootstrap v5.0.1 -->
  <link th:href="@{'/css/bootstrap.css'}" type="text/css" rel="stylesheet">
  <script th:src="@{'/js/bootstrap.bundle.js'}" type="text/javascript"></script>
  <!-- Bootstrap Icons v1.5.0 -->
  <link th:href="@{'/css/bootstrap-icons.css'}" type="text/css" rel="stylesheet">
  <!-- Custom Styles -->
  <link th:href="@{'/css/styles.css'}" type="text/css" rel="stylesheet">
  <script>
    var changeLanguage = function (dom) {
      window.location.href = '?lang=' + dom.value;
    }
  </script>
</head>

<body style="padding-top: 55px;">
<!--header frag-->
<div th:replace="/admin/common/fragments :: header_nav"> </div>
<!-- Sidebar Fragment -->
<div th:replace="/admin/common/fragments :: side_navbar"> </div>
<div class="main-content">
  <div class="container-fluid">
    <div class="container py-4">
      <div class="container bg-white p-4 rounded shadow">
        <h4>Chi tiết vé #<span th:text="${ticket.id}"></span></h4>

        <div class="card mb-3">
          <div class="card-body">
            <h5>Thông tin đơn hàng</h5>
            <p>Mã đơn: <span th:text="${ticket.orderCode}"></span></p>
            <p>Khách hàng: <span th:text="${ticket.userFullName}"></span> (<span th:text="${ticket.userEmail}"></span>)</p>
            <p>Phương thức thanh toán: <span th:text="${ticket.paymentMethod}"></span></p>
          </div>
        </div>

        <div class="card mb-3">
          <div class="card-body">
            <h5>Hành trình</h5>
            <p>Tàu: <span th:text="${ticket.trainName}"></span></p>
            <p>Ga đi: <span th:text="${ticket.departureStation}"></span></p>
            <p>Ga đến: <span th:text="${ticket.arrivalStation}"></span></p>
            <p>Thời gian:
              <span th:text="${#temporals.format(ticket.departureAt, 'dd/MM/yyyy HH:mm')}"></span> →
              <span th:text="${#temporals.format(ticket.arrivalAt, 'dd/MM/yyyy HH:mm')}"></span>
            </p>
          </div>
        </div>

        <div class="card mb-3">
          <div class="card-body">
            <h5>Chỗ ngồi & giá</h5>
            <p>Toa: <span th:text="${ticket.coachName}"></span></p>
            <p>Ghế: <span th:text="${ticket.seatName}"></span></p>
            <p>Loại vé: <span th:text="${ticket.ticketType}"></span></p>
            <p>Giá: <span th:text="${#numbers.formatDecimal(ticket.price, 0, 'COMMA', 0, 'POINT')}"></span> ₫</p>
          </div>
        </div>

        <div class="card">
          <div class="card-body">
            <h5>Lịch sử thay đổi</h5>
            <table class="table table-sm">
              <thead>
              <tr>
                <th>Hành động</th>
                <th>Trạng thái cũ</th>
                <th>Trạng thái mới</th>
                <th>Lý do</th>
                <th>Người cập nhật</th>
                <th>Thời gian</th>
              </tr>
              </thead>
              <tbody>
              <tr th:each="log : ${ticket.logs}">
                <td th:text="${log.action}"></td>
                <td th:text="${log.oldStatus}"></td>
                <td th:text="${log.newStatus}"></td>
                <td th:text="${#strings.isEmpty(log.reason) ? 'null' : log.reason}"></td>
                <td th:text="${log.updatedBy}"></td>
                <td th:text="${#temporals.format(log.updatedAt, 'dd/MM/yyyy HH:mm')}"></td>
              </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>



    </div>
  </div>
</div>
</body>
</html>
