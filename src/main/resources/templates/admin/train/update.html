                            </div>

                            <!-- LOẠI TOA -->
                            <div class="col-md-3">

                                        th:data-index="${iStat.index}"
                                        th:field="*{coaches[__${iStat.index}__].type}">

                                </select>
                            </div>

                            <!-- TRẠNG THÁI -->
                            <div class="col-md-3">

                                <select class="form-select coach-state-select"

                                </select>
                            </div>

<script>
    function getPrefix(type) {
        return type === 'vip' ? 'V' : 'S';
    }

    function getExistingCoachCodes() {
        return Array.from(document.querySelectorAll('.coach-code'))
            .map(i => i.value)
            .filter(v => v);
    }

    function syncCapacity(input) {
        const index = input.dataset.index;
        document.getElementById('capacityHidden-' + index).value = input.value;
    }

    function generateCoachCode(prefix) {
        const codes = getExistingCoachCodes();
        let max = 0;

        codes.forEach(code => {
            if (code.startsWith(prefix)) {
                const n = parseInt(code.substring(1));
                if (!isNaN(n)) max = Math.max(max, n);
            }
        });

        return prefix + (max + 1);
    }

    // 🔥 CHỈ chạy khi bấm "Xem trước"
    function previewCoach(index) {

        const typeSelect = document.querySelector(`.coach-type[data-index="${index}"]`);
        const capacityInput = document.querySelector(`.coach-capacity[data-index="${index}"]`);
        const seatContainer = document.getElementById(`seat-container-${index}`);
        const codeInput = document.getElementById(`coachCode-${index}`);
        const capacityHidden = document.getElementById(`capacityHidden-${index}`);

        const capacity = parseInt(capacityInput.value);
        if (isNaN(capacity) || capacity <= 0) {
            alert("Sức chứa không hợp lệ");
            return;
        }

        const prefix = getPrefix(typeSelect.value);

        // ⚠️ CHỈ đổi mã toa khi admin xem trước & loại khác
        if (!codeInput.value.startsWith(prefix)) {
            codeInput.value = generateCoachCode(prefix);
        }

        const coachCode = codeInput.value;

        capacityHidden.value = capacity;
        seatContainer.innerHTML = '';

        for (let i = 1; i <= capacity; i++) {
            const seatCode = coachCode + i;

            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = `coaches[${index}].seats[${i - 1}].seatCode`;
            input.value = seatCode;

            const badge = document.createElement('span');
            badge.className = 'badge bg-secondary m-1';
            badge.innerText = seatCode;

            seatContainer.appendChild(input);
            seatContainer.appendChild(badge);
        }
    }

    function updateCoachStateColor(select) {
        select.classList.remove('bg-success', 'bg-secondary');

        const selectedOption = select.options[select.selectedIndex];
        const className = selectedOption.getAttribute('data-class');

        if (className) {
            className.split(' ').forEach(c => select.classList.add(c));
        }
    }

    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.coach-state-select')
            .forEach(updateCoachStateColor);
    });

    document.addEventListener('change', function (e) {
        if (e.target.classList.contains('coach-state-select')) {
            updateCoachStateColor(e.target);
        }
    });

    // ❌ CHẶN ENTER SUBMIT NHẦM
    document.querySelector('form').addEventListener('keydown', e => {
        if (e.key === 'Enter') e.preventDefault();
    });
</script>
