<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:fragment="head(title)">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <title th:text="${title}"></title>
        <link th:href="@{/img/favicon.ico}" rel="shortcut icon" type="image/x-icon">
        <!-- Bootstrap v5.0.1 -->
        <link th:href="@{/css/bootstrap.css}" type="text/css" rel="stylesheet">
        <script th:src="@{/js/bootstrap.bundle.js}" type="text/javascript"></script>
        <!-- Bootstrap Icons v1.5.0 -->
        <link th:href="@{/static/css/bootstrap-icons.css}" type="text/css" rel="stylesheet">
        <!-- Custom Styles -->
        <link th:href="@{/css/styles.css}" type="text/css" rel="stylesheet">
        <script>
            var changeLanguage = function (dom) {
                window.location.href = '?lang=' + dom.value;
            }
        </script>
    </head>
</head>

<header class="section-header" th:fragment="header()">
    <section class="header-main border-bottom">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-3 py-3">
                    <a class="text-body" href="./home.html">
                        <h3>Shop Bán Sách</h3>
                    </a>
                </div> <!-- col.// -->
                <div class="col-lg-4 col-xl-5">
                    <form action="#" class="search">
                        <div class="input-group w-100">
                            <input type="text" class="form-control" placeholder="Nhập từ khóa cần tìm ...">
                            <button class="btn btn-primary" type="button">
                                <i class="bi bi-search"></i>
                            </button>
                        </div>
                    </form>
                </div> <!-- col.// -->
                <div class="col-lg-5 col-xl-4">
                    <ul class="nav col-12 col-lg-auto my-2 my-lg-0 justify-content-center justify-content-lg-end text-small">
                        <li>
                            <a href="#" class="nav-link text-body">
                                <i class="bi bi-person d-block text-center fs-3"></i>
                                Tài khoản
                            </a>
                        </li>
                        <li>
                            <a href="#" class="nav-link text-body">
                                <i class="bi bi-list-check d-block text-center fs-3"></i>
                                Đơn hàng
                            </a>
                        </li>
                        <li>
                            <a href="#" class="nav-link text-body">
                                <i class="bi bi-cart d-block text-center fs-3"></i>
                                Giỏ hàng
                            </a>
                        </li>
                    </ul>
                </div> <!-- col.// -->
            </div> <!-- row.// -->
        </div> <!-- container.// -->
    </section> <!-- header-main.// -->
</header> <!-- section-header.// -->


<!--phân trang-->
<nav th:fragment="paginationid()" class="mt-4" th:if="${page.totalPages > 0}">
    <ul class="pagination">
        <!-- Previous page link -->
        <li class="page-item" th:classappend="${page.first} ? 'disabled'">
            <a class="page-link"
               th:href="@{${path} (page=${page.number - 1})}"
               th:if="${!page.first}">Trang trước</a>
            <span class="page-link" th:if="${page.first}">Trang trước</span>
        </li>

        <!-- Page numbers -->
        <li class="page-item"
            th:each="pageNo : ${#numbers.sequence(0, page.totalPages - 1)}"
            th:if="${pageNo >= page.number - 2 and pageNo <= page.number + 2}"
            th:classappend="${pageNo == page.number} ? 'active'">
            <a class="page-link"
               th:href="@{${path} (page=${pageNo})}"
               th:text="${pageNo + 1}"></a>
        </li>

        <!-- Next page link -->
        <li class="page-item" th:classappend="${page.last} ? 'disabled'">
            <a class="page-link"
               th:href="@{${path} (page=${page.number + 1})}"
               th:if="${!page.last}">Trang sau</a>
            <span class="page-link" th:if="${page.last}">Trang sau</span>
        </li>
    </ul>
</nav>


<script th:if="${currentUser != null}">
    window.APP_CONTEXT = {
        userId: [[${currentUser.id}]],
        role: 'USER'
    };
</script>

<script src="/js/common/websocket-user.js"></script>

</html>
