<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán bằng QR</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
    background: linear-gradient(135deg, #eef2f7, #f8fbff);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
}

.qr-container {
    width: 100%;
    max-width: 420px;
}

.qr-card {
    background: #ffffff;
    border-radius: 20px;
    padding: 35px 30px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
    text-align: center;
    position: relative;
}

.qr-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 15px;
}

.amount {
    font-size: 28px;
    font-weight: 700;
    color: #e53935;
    margin-bottom: 15px;
}

.qr-box {
    background: #fff;
    padding: 20px;
    border-radius: 16px;
    border: 1px solid #e0e6ed;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: inset 0 4px 12px rgba(0,0,0,0.03);
    margin: 20px 0;
}

.countdown {
    font-size: 14px;
    color: #ff9800;
    font-weight: 500;
}

.btn-check-status {
    margin-top: 20px;
    border-radius: 30px;
    padding: 8px 25px;
    font-weight: 500;
}

a {
    text-decoration: none;
}
    </style>
</head>
<body>

<div class="qr-container">
    <div class="qr-card">

        <div class="qr-title">Quét mã QR để thanh toán</div>

        <div class="qr-box">
            <div id="qrcode"></div>
        </div>
        <div class="countdown">
            Mã QR hết hạn sau: <span id="timer">10:00</span>
        </div>

        <button class="btn btn-success btn-check-status"
                onclick="window.location.reload()">
            Tôi đã thanh toán
        </button>

        <div class="mt-3">
            <a th:href="@{/user/order/view}" class="text-muted">Hủy thanh toán</a>
        </div>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
    // Tạo QR
    new QRCode(document.getElementById("qrcode"), {
        text: "[[${paymentUrl}]]",
        width: 250,
        height: 250
    });

    // Countdown 10 phút
    let timeLeft = 600; // 600s = 10 phút
    const timerElement = document.getElementById("timer");

    const countdown = setInterval(() => {
        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;

        timerElement.textContent =
            String(minutes).padStart(2, '0') + ":" +
            String(seconds).padStart(2, '0');

        if (timeLeft <= 0) {
            clearInterval(countdown);
            alert("Mã QR đã hết hạn!");
            window.location.reload();
        }

        timeLeft--;
    }, 1000);
</script>

</body>
</html>
