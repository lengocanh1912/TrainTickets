<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt lại mật khẩu</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link th:href="@{/img/favicon.ico}" rel="shortcut icon" type="image/x-icon">
    <!-- Bootstrap v5.0.1 -->
    <link th:href="@{/css/bootstrap.css}" type="text/css" rel="stylesheet">
    <script th:src="@{/js/bootstrap.bundle.js}" type="text/javascript"></script>
    <!-- Bootstrap Icons v1.5.0 -->
    <link th:href="@{/static/css/bootstrap-icons.css}" type="text/css" rel="stylesheet">
    <!-- Custom Styles -->
    <link th:href="@{/css/styles.css}" type="text/css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KyZXEJ10x8bH8tQy4bm8a7Unw7CkCz7Y2pA8a6vFtvbA0hZTkNffpV8V4jeIm9xr" crossorigin="anonymous">
    <!-- Bootstrap Icons (optional, for the account icon) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body class="min-h-screen bg-white flex items-center justify-center">

<!-- Navbar-->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">

    <div class="container-fluid px-5">

        <!-- LOGO -->
        <a class="navbar-brand" th:href="@{/user/home}">TrainTicket</a>

        <!-- MENU -->
        <div class="navbar-nav">
            <a class="nav-link text-white"
               th:href="@{/user/home}"
               th:classappend="${menu == 'userHome'} ? 'active'">
                Home
            </a>

            <a class="nav-link text-white"
               th:href="@{/user/trip/list}"
               th:classappend="${menu == 'trip'} ? 'active'">
                Trip
            </a>

            <a class="nav-link text-white" href="#">Train Seat</a>

            <!-- SUPPORT -->
            <a class="nav-link text-white position-relative"
               th:href="@{/user/support}"
               th:classappend="${menu == 'support'} ? 'active'">

                Support
                <span id="support-unread-badge"
                      class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                      style="display:none;font-size:0.65rem;">
                    0
                </span>
            </a>

            <a class="nav-link text-white"
               th:href="@{/user/review/view}"
               th:classappend="${menu == 'review'} ? 'active'">
                Rating
            </a>

            <a class="nav-link text-white" href="#">Q&A</a>
        </div>

        <!-- RIGHT -->
        <div class="d-flex text-white ms-auto align-items-center">

            <a th:href="@{/user/order/view}" class="nav-link text-white">
                <i class="bi bi-cart"></i> Đơn hàng
            </a>

            <!-- ACCOUNT -->
            <div class="dropdown">
                <button class="btn btn-light"
                        type="button"
                        id="accountDropdown"
                        data-bs-toggle="dropdown">
                    <i class="bi bi-person"></i>
                    <span th:text="${currentUser != null ? currentUser.fullname : 'Tài khoản'}"></span>
                </button>

                <ul class="dropdown-menu dropdown-menu-end">
                    <li th:if="${currentUser != null}">
                        <a class="dropdown-item"
                           th:href="@{/user/account}">
                            Tài khoản
                        </a>
                    </li>

                    <li th:if="${currentUser != null}">
                        <a class="dropdown-item"
                           th:href="@{/logout}">
                            Đăng xuất
                        </a>
                    </li>

                    <li th:if="${currentUser == null}">
                        <a class="dropdown-item"
                           th:href="@{/login}">
                            Đăng nhập
                        </a>
                    </li>

                    <li th:if="${currentUser == null}">
                        <a class="dropdown-item"
                           th:href="@{/register}">
                            Tạo tài khoản
                        </a>
                    </li>
                </ul>
            </div>

        </div>
    </div>
</nav>

<div class="w-full max-w-md bg-white border border-gray-200 rounded-2xl shadow-lg p-8">
    <!-- Title -->
    <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Đặt lại mật khẩu</h2>
        <p class="text-sm text-gray-500 mt-1">
            Vui lòng nhập mật khẩu mới của bạn
        </p>
    </div>

    <!-- Form -->
    <form th:action="@{/reset-password}" method="post" class="space-y-4">

        <!-- Token -->
        <input type="hidden" name="token" th:value="${token}">

        <!-- New password -->
        <div class="relative">
            <label class="block text-sm font-medium text-gray-600 mb-1">
                Mật khẩu mới
            </label>

            <input type="password"
                   id="newPassword"
                   name="newPassword"
                   required
                   placeholder="Nhập mật khẩu mới"
                   class="w-full px-4 py-2 border rounded-lg
                  focus:ring-2 focus:ring-blue-500 focus:outline-none">

            <i class="fa-solid fa-eye absolute right-3 top-9 cursor-pointer text-gray-500"
               onclick="togglePassword('newPassword', this)"></i>
        </div>

        <!-- Confirm password -->
        <div class="relative">
            <label class="block text-sm font-medium text-gray-600 mb-1">
                Xác nhận mật khẩu
            </label>

            <input type="password"
                   id="confirmPassword"
                   name="confirmPassword"
                   required
                   placeholder="Nhập lại mật khẩu"
                   class="w-full px-4 py-2 border rounded-lg
                  focus:ring-2 focus:ring-blue-500 focus:outline-none">

            <i class="fa-solid fa-eye absolute right-3 top-9 cursor-pointer text-gray-500"
               onclick="togglePassword('confirmPassword', this)"></i>
        </div>

        <!-- Submit -->
        <button type="submit"
                class="w-full py-2 bg-blue-600 text-white rounded-lg font-medium
                       hover:bg-blue-700 transition duration-200">
            Xác nhận đổi mật khẩu
        </button>

        <p class="text-sm text-gray-500 text-center mt-2">
            Liên kết sẽ hết hạn sau
            <span id="countdown" class="font-semibold text-red-600"></span>
        </p>

        <!-- Message success -->
        <p th:if="${message}"
           th:text="${message}"
           class="text-sm text-green-600 text-center mt-2"></p>

        <!-- Message error -->
        <p th:if="${error}"
           th:text="${error}"
           class="text-sm text-red-600 text-center mt-2"></p>
    </form>

    <!-- Back login -->
    <div class="text-center mt-6">
        <a th:href="@{/login}"
           class="text-sm text-blue-600 hover:underline">
            ← Quay lại đăng nhập
        </a>
    </div>
</div>

</body>

<script>
    const expiryTime = [[${expiryTime}]]; // milliseconds
    const countdownEl = document.getElementById("countdown");

    function updateCountdown() {
        const now = Date.now();
        const diff = expiryTime - now;

        if (diff <= 0) {
            countdownEl.textContent = "0:00";
            alert("Link đã hết hạn, vui lòng yêu cầu lại.");
            location.href = "/forgot-password";
            return;
        }

        const minutes = Math.floor(diff / 1000 / 60);
        const seconds = Math.floor((diff / 1000) % 60);

        countdownEl.textContent =
            `${minutes}:${seconds.toString().padStart(2, "0")}`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
</script>

<script>
    function togglePassword(inputId, icon) {
        const input = document.getElementById(inputId);

        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove("fa-eye");
            icon.classList.add("fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.remove("fa-eye-slash");
            icon.classList.add("fa-eye");
        }
    }
</script>
</html>
